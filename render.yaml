services:
  - type: web
    name: zain-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: starter # يمكنك تغيير الخطة حسب احتياجاتك (starter, standard, etc.)
    autoDeploy: true
    buildCommand: |
      composer install --no-dev --optimize-autoloader && \
      php artisan key:generate && \
      php artisan migrate --force
    startCommand: sh -c "php-fpm -D && nginx -g 'daemon off;'"
    envVars:
      - key: APP_KEY
        sync: false # يجب تعيين هذا المتغير يدوياً في Render
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: pgsql # أو mysql إذا كنت تستخدم MySQL
      - key: DB_HOST
        sync: false # يجب تعيين هذا المتغير يدوياً في Render (عادةً يكون اسم خدمة قاعدة البيانات في Render)
      - key: DB_PORT
        value: 5432 # أو 3306 لـ MySQL
      - key: DB_DATABASE
        sync: false # يجب تعيين هذا المتغير يدوياً في Render
      - key: DB_USERNAME
        sync: false # يجب تعيين هذا المتغير يدوياً في Render
      - key: DB_PASSWORD
        sync: false # يجب تعيين هذا المتغير يدوياً في Render
      # أضف أي متغيرات بيئة أخرى تحتاجها تطبيقك هنا
