services:
  - type: web
    name: zain-backend
    runtime: image
    repo: https://github.com/marwanhubeg/zain-real-estate
    branch: main
    rootDir: backend
    plan: free
    dockerCommand: |
      composer install --no-interaction --optimize-autoloader
      cp .env.example .env
      php artisan key:generate
      php artisan migrate --force
      php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://zain-backend.onrender.com
      - key: FRONTEND_URL
        value: https://zain-real-estate.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: zain-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: zain-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: zain-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: zain-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: zain-db
          property: password

databases:
  - name: zain-db
    databaseName: zain_real_estate
    user: zain_admin
    plan: free
